<title>CCM · Control de Costos</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --verde:#2D6A4F;--verde2:#3D8B6A;--verde-pale:#D8F3DC;--verde-light:#E8F8EE;
    --rojo:#C0392B;--rojo-light:#FFEAEA;
    --amarillo:#E67E22;--amarillo-light:#FFF3E0;
    --azul:#1A5276;--azul-light:#E8F0FE;
    --morado:#7B1FA2;--morado-light:#F3E5F5;
    --bg:#EEEEF3;--card:#FFFFFF;--text:#111111;--muted:#888888;--border:#E8E8F0;
  }
  body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;color:var(--text);max-width:430px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom)}
  
  /* NAV */
  .nav{background:var(--bg);padding:12px 16px 8px;position:sticky;top:0;z-index:100;padding-top:calc(12px + env(safe-area-inset-top))}
  .nav-row{display:flex;align-items:center;gap:8px}
  .tabs{display:flex;background:#E0E0EB;border-radius:22px;padding:3px;flex:1}
  .tab{flex:1;padding:7px 2px;border:none;background:transparent;font-size:12px;font-weight:600;color:#999;border-radius:19px;cursor:pointer;transition:all .2s;letter-spacing:-.1px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;-webkit-user-select:none}
  .tab.active{background:#fff;color:var(--verde);box-shadow:0 1px 4px rgba(0,0,0,.12)}
  .live-badge{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0}
  .live-dot{width:7px;height:7px;border-radius:50%;background:#34C759;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  
  /* PAGES */
  .page{display:none;padding:0 16px 20px;animation:fadeIn .2s ease}
  .page.active{display:block}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  
  /* GREETING */
  .greeting{padding:14px 0 10px}
  .greeting h1{font-size:22px;font-weight:800;color:var(--text);line-height:1.2}
  .greeting p{font-size:13px;color:var(--muted);margin-top:3px}
  
  /* CARD BASE */
  .card{background:var(--card);border-radius:20px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}
  
  /* META CARD */
  .meta-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0}
  .meta-item{padding:0 6px}
  .meta-item:not(:first-child){border-left:1px solid #F0F0F6}
  .meta-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;line-height:1.4;margin-bottom:3px}
  .meta-value{font-size:15px;font-weight:800;color:var(--text);line-height:1}
  .meta-sub{font-size:11px;color:var(--muted);margin-top:2px}
  .badge-ok{display:inline-flex;align-items:center;gap:4px;background:var(--verde-light);color:var(--verde);font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;margin-top:10px}
  
  /* KPI GRID */
  .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .kpi-card{background:var(--card);border-radius:18px;padding:14px 14px 12px;border:1px solid var(--border)}
  .kpi-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
  .kpi-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
  .b-red{background:var(--rojo-light);color:var(--rojo)}
  .b-orange{background:var(--amarillo-light);color:var(--amarillo)}
  .b-green{background:var(--verde-light);color:var(--verde)}
  .b-blue{background:var(--azul-light);color:var(--azul)}
  .b-purple{background:var(--morado-light);color:var(--morado)}
  .kpi-amount{font-size:26px;font-weight:900;color:var(--text);margin:5px 0 2px;line-height:1;letter-spacing:-1px}
  .kpi-amount.red{color:var(--rojo)}
  .kpi-amount.green{color:var(--verde)}
  .kpi-sub{font-size:11px;color:var(--muted)}
  
  /* ALERTAS */
  .alert-card{background:var(--card);border-radius:18px;padding:13px 14px 13px 18px;margin-bottom:10px;border:1px solid var(--border);position:relative;overflow:hidden;display:flex;align-items:center;gap:12px}
  .alert-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
  .alert-card.rojo::before{background:var(--rojo)}
  .alert-card.amarillo::before{background:var(--amarillo)}
  .alert-card.verde::before{background:#27AE60}
  .alert-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .alert-icon.rojo{background:var(--rojo-light)}
  .alert-icon.amarillo{background:var(--amarillo-light)}
  .alert-icon.verde{background:var(--verde-light)}
  .alert-body{flex:1;min-width:0}
  .alert-title{font-size:14px;font-weight:700;color:var(--text)}
  .alert-desc{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}
  .alert-monto{font-size:14px;font-weight:800;flex-shrink:0}
  .alert-monto.rojo{color:var(--rojo)}
  .alert-monto.amarillo{color:var(--amarillo)}
  
  /* SECCIÓN TITLE */
  .sec-title{font-size:17px;font-weight:800;color:var(--text);margin-bottom:3px}
  .sec-sub{font-size:13px;color:var(--muted);margin-bottom:12px}
  
  /* CATEGORÍAS */
  .cat-row{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid #F5F5F9}
  .cat-row:last-child{border-bottom:none}
  .cat-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-right:9px}
  .cat-name{flex:1;font-size:13px;color:var(--text);font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cat-bar-wrap{width:64px;height:5px;background:#F0F0F6;border-radius:3px;margin:0 10px;flex-shrink:0}
  .cat-bar{height:5px;border-radius:3px;min-width:2px}
  .cat-pct{font-size:11px;color:var(--muted);width:30px;text-align:right;flex-shrink:0}
  .cat-amount{font-size:13px;font-weight:800;color:var(--text);min-width:68px;text-align:right;flex-shrink:0}
  
  /* MES ROWS */
  .mes-row{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid #F5F5F9}
  .mes-row:last-child{border-bottom:none}
  .mes-name{font-size:14px;font-weight:800;width:38px;flex-shrink:0}
  .mes-bar-wrap{flex:1;height:5px;background:#F0F0F6;border-radius:3px;margin:0 10px}
  .mes-bar{height:5px;border-radius:3px;background:var(--verde)}
  .mes-amount{font-size:13px;font-weight:800;color:var(--text);text-align:right;min-width:70px;flex-shrink:0}
  .mes-var{font-size:10px;text-align:right;min-width:38px;flex-shrink:0;font-weight:600}
  .flujo-total{background:var(--verde-light);border-radius:12px;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;margin-top:10px}
  .flujo-label{font-size:13px;font-weight:700;color:var(--verde)}
  .flujo-amt{font-size:17px;font-weight:900;color:var(--verde)}
  
  /* PROYECCIÓN */
  .proj-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
  .proj-card{background:var(--card);border-radius:14px;padding:12px 10px;border:1px solid var(--border)}
  .proj-label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
  .proj-amt{font-size:17px;font-weight:900;color:var(--text);line-height:1.1;letter-spacing:-.5px}
  .proj-sub{font-size:9px;color:var(--muted);margin-top:3px;line-height:1.3}
  .proj-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:6px;background:var(--morado-light);color:var(--morado);margin-left:3px}
  
  /* CHART CARD */
  .chart-card{background:var(--card);border-radius:20px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}
  .chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .chart-title{font-size:14px;font-weight:700;color:var(--text)}
  .legend-row{display:flex;gap:14px;margin-bottom:10px}
  .leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
  .leg-dot{width:8px;height:8px;border-radius:50%}
  
  /* LOADING / ERROR */
  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px}
  .spinner{width:40px;height:40px;border:3px solid var(--verde-pale);border-top-color:var(--verde);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-size:14px;color:var(--muted);text-align:center}
  .error-card{background:#FFEAEA;border-radius:16px;padding:20px;margin:16px;text-align:center}
  .error-title{font-size:16px;font-weight:700;color:var(--rojo);margin-bottom:8px}
  .error-desc{font-size:13px;color:var(--rojo);line-height:1.5}
  .retry-btn{background:var(--verde);color:#fff;border:none;border-radius:12px;padding:10px 24px;font-size:14px;font-weight:700;margin-top:14px;cursor:pointer}
  
  /* SPLASH */
  .splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .4s}
  .splash.hidden{opacity:0;pointer-events:none}
  .splash-logo{width:180px;background:#fff;border-radius:20px;padding:24px;margin-bottom:24px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
  .splash-logo img{width:100%;height:auto}
  .splash-bar-wrap{width:200px;height:4px;background:#E0E0E8;border-radius:2px;overflow:hidden}
  .splash-bar{height:100%;background:var(--verde);border-radius:2px;transition:width .3s}
  .splash-text{font-size:13px;color:var(--muted);margin-top:10px}

  /* LOGO PLACEHOLDER (SVG del logo CCM) */
  .ccm-logo{display:flex;align-items:center;gap:10px}
  .ccm-logo svg{width:48px;height:48px}
  .ccm-logo-text{display:flex;flex-direction:column}
  .ccm-logo-text span:first-child{font-size:12px;font-weight:800;color:var(--verde);line-height:1}
  .ccm-logo-text span:last-child{font-size:10px;color:var(--verde2);line-height:1.3}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ══════════════════════════════════════════════════════════════════
// ⚠️  CONFIGURACIÓN — REEMPLAZAR CON TU URL REAL
// Después de publicar el Apps Script, pega aquí la URL
// ══════════════════════════════════════════════════════════════════
// Fix iOS touch events
document.addEventListener('touchstart', function(){}, {passive:true});

const API_URL = 'https://script.google.com/macros/s/AKfycbwSrKi1dkyP7ox_75Mpj8XacoD0Kdnv0o17_9WYij11ymXr2EwO-fxn_Pl9R4knLK95/exec';
// Ejemplo: 'https://script.google.com/macros/s/AKfy.../exec'

const COLORES_CAT = [
  '#2D6A4F','#1A6B47','#117A65','#1F618D',
  '#6C3483','#7D6608','#C0392B','#1A5276',
  '#884EA0','#148F77','#B7950B','#839192'
];

let DATA = null;
let charts = {};

// ── SPLASH ANIMATION ──────────────────────────────────────────────
function setSplash(pct, texto) {
  document.getElementById('splash-bar').style.width = pct + '%';
  if (texto) document.getElementById('splash-text').textContent = texto;
}
function hideSplash() {
  setTimeout(() => document.getElementById('splash').classList.add('hidden'), 300);
}

// ── NAV ────────────────────────────────────────────────────────────
function showTab(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
  window.scrollTo(0,0);
  // Redibujar charts de la tab activada (necesario porque estaban en display:none)
  if (DATA) {
    setTimeout(() => {
      if (id === 'resumen' && charts.tend) { charts.tend.destroy(); charts.tend = null; dibujarChartTend(DATA); }
      if (id === 'meses')    { if (charts.mes)  { charts.mes.destroy();  charts.mes  = null; } dibujarChartMes(DATA); }
      if (id === 'proyeccion') { if (charts.proj) { charts.proj.destroy(); charts.proj = null; } if (charts.esc) { charts.esc.destroy(); charts.esc = null; } dibujarChartProy(DATA); }
    }, 50);
  }
}

// ── SALUDO ─────────────────────────────────────────────────────────
function saludo() {
  const h = new Date().getHours();
  return h < 12 ? 'Buenos días' : h < 20 ? 'Buenas tardes' : 'Buenas noches';
}

// ── FORMATO NÚMEROS ─────────────────────────────────────────────────
function fmt(n) {
  if (!n || n === 0) return '$0';
  const abs = Math.abs(n);
  if (abs >= 1e9) return (n < 0 ? '-' : '') + '$' + (abs/1e9).toFixed(1) + 'B';
  if (abs >= 1e6) return (n < 0 ? '-' : '') + '$' + (abs/1e6).toFixed(1) + ' M';
  if (abs >= 1e3) return (n < 0 ? '-' : '') + '$' + Math.round(abs/1e3) + 'K';
  return (n < 0 ? '-$' : '$') + Math.round(abs).toLocaleString('es-CL');
}
function fmtPct(v) {
  const s = v >= 0 ? '+' : '';
  return s + Math.round(v * 100) + '%';
}

// ── FETCH DATOS ─────────────────────────────────────────────────────
async function cargarDatos() {
  setSplash(20, 'Conectando con Google Sheets...');
  
  // Si no hay URL configurada, usar datos de ejemplo
  if (API_URL === 'TU_URL_AQUI') {
    setSplash(60, 'Cargando datos de ejemplo...');
    await new Promise(r => setTimeout(r, 800));
    DATA = datosEjemplo();
    setSplash(100, '¡Listo!');
    renderTodo();
    hideSplash();
    return;
  }
  
  try {
    setSplash(40, 'Leyendo datos del mes...');
    const res = await fetch(API_URL + '?v=' + Date.now());
    setSplash(75, 'Procesando información...');
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    DATA = json;
    setSplash(100, '¡Listo!');
    renderTodo();
    hideSplash();
  } catch(err) {
    setSplash(100, 'Error de conexión');
    hideSplash();
    mostrarError(err.toString());
  }
}

function mostrarError(msg) {
  document.getElementById('resumen-content').innerHTML = `
    <div class="error-card">
      <div class="error-title">No se pudo cargar</div>
      <div class="error-desc">Verifica que el Apps Script esté publicado correctamente.<br><br><small>${msg}</small></div>
      <button class="retry-btn" onclick="location.reload()">Reintentar</button>
    </div>`;
}

// ── RENDER TODO ─────────────────────────────────────────────────────
function renderTodo() {
  const d = DATA;
  document.getElementById('upd-label').textContent = d.meta.actualizado || '—';
  // Compatibilidad nueva API
  if (!d.meta.labelMesActual) d.meta.labelMesActual = (d.meta.mes || '') + ' ' + (d.meta.anio || '');
  if (!d.ultimos12) d.ultimos12 = [];
  if (!d.alertas) {
    d.alertas = [];
    const r = d.resumen;
    if (r.totalPend > 500000) d.alertas.push({nivel:'rojo', titulo:'Pagos pendientes urgentes', desc:'Supera $500.000 pendiente', monto: r.totalPend});
    else if (r.totalPend > 100000) d.alertas.push({nivel:'amarillo', titulo:'Pagos pendientes', desc:'Revisar pagos del mes', monto: r.totalPend});
    if (d.secciones) d.secciones.forEach(s => {
      if (s.pend > 200000) d.alertas.push({nivel:'amarillo', titulo:s.nombre+' pendiente', desc:'Revisar pagos', monto: s.pend});
    });
    if (d.alertas.length === 0) d.alertas.push({nivel:'verde', titulo:'Todo en orden', desc:'Sin alertas activas este mes', monto:0});
  }
  if (!d.proyeccion) d.proyeccion = { promedio: d.resumen.totalMes, tendencia: 0, proximo: d.resumen.totalMes, en3meses: d.resumen.totalMes*3, en6meses: d.resumen.totalMes*6 };
  renderResumen(d);
  renderCategorias(d);
  renderMeses(d);
  renderProyeccion(d);
  // Dibujar chart de la tab activa (resumen) después de que el DOM esté listo
  setTimeout(() => dibujarChartTend(d), 100);
}

function dibujarChartTend(d) {

  proyData2[proyData2.length - 1] = reales2.filter(v=>v!==null).pop();
  proyData2.push(d.proyeccion.proximo);

  if (!el) return;
  if (charts.tend) charts.tend.destroy();
  charts.tend = new Chart(el, {
    type: 'line',
    data: {
      labels: labels2,
      datasets: [
        { label:'Real', data:realData2, borderColor:'#2D6A4F', backgroundColor:'rgba(45,106,79,.08)', fill:true, tension:.35, pointRadius:3, pointBackgroundColor:'#2D6A4F', borderWidth:2.5 },
        { label:'Proyectado', data:proyData2, borderColor:'#7B1FA2', backgroundColor:'transparent', borderDash:[5,4], tension:.35, pointRadius:3, pointBackgroundColor:'#7B1FA2', borderWidth:2 }

// ── RENDER CATEGORÍAS ───────────────────────────────────────────────
function renderCategorias(d) {
  const total = d.resumen.totalMes || d.resumen.totalMes;
  const labelMes = d.meta.labelMesActual || (d.meta.mes + ' ' + d.meta.anio);
  document.getElementById('cat-sub').textContent = `${labelMes} · Total ${fmt(total)}`;
  
  // Soporta tanto estructura nueva (secciones) como vieja (porCategoria)
  let items = [];
  if (d.secciones && d.secciones.length > 0) {
    items = d.secciones.map((s,i) => ({
      nombre: s.nombre,
      monto: s.total,
      pend: s.pend,
      color: s.color || COLORES_CAT[i % COLORES_CAT.length],
      pct: total > 0 ? s.total / total : 0
    }));
  } else if (d.porCategoria) {
    items = d.porCategoria.map((c,i) => ({
      nombre: c.cat,
      monto: c.monto,
      pend: c.pend,
      color: COLORES_CAT[i % COLORES_CAT.length],
      pct: c.pct
    }));
  }
  
  items = items.filter(c => c.monto > 0).sort((a,b) => b.monto - a.monto);
  const maxMonto = items[0]?.monto || 1;
  
  let html = '';
  items.forEach((c, i) => {
    const pct = Math.round(c.pct * 100);
    const barW = Math.round((c.monto / maxMonto) * 100);
    const pendBadge = c.pend > 0 ? `<span style="font-size:10px;color:#C0392B;margin-left:4px">Pend: ${fmt(c.pend)}</span>` : '';
    html += `
      <div class="cat-row">
        <div class="cat-dot" style="background:${c.color}"></div>
        <div class="cat-name">${c.nombre}${pendBadge}</div>
        <div class="cat-bar-wrap"><div class="cat-bar" style="width:${barW}%;background:${c.color}"></div></div>
        <div class="cat-pct">${pct}%</div>
        <div class="cat-amount">${fmt(c.monto)}</div>
      </div>`;
  });
  
  if (!items.length) html = '<div style="text-align:center;padding:24px;color:#999;font-size:14px">Sin datos este mes — la administradora aún no ha ingresado montos</div>';
  document.getElementById('cat-content').innerHTML = html;
}

// ── RENDER MESES ────────────────────────────────────────────────────
function renderMeses(d) {
  const meses = (d.ultimos12 || []).filter(m => m.total > 0);
  const maxMonto = Math.max(...meses.map(m => m.total), 1);
  const total2026 = meses.reduce((s,m) => s + m.total, 0);
  
  let rowsHtml = '';
  meses.forEach((m, i) => {
    const barW = Math.round((m.total / maxMonto) * 100);
    const isActual = i === meses.length - 1;
    const varColor = m.var_pct > 0.1 ? '#C0392B' : m.var_pct > 0 ? '#E67E22' : '#27AE60';
    rowsHtml += `
      <div class="mes-row">
        <div class="mes-name" style="color:${isActual ? '#2D6A4F' : '#111'}">${m.label}</div>
        <div class="mes-bar-wrap"><div class="mes-bar" style="width:${barW}%;background:${isActual ? '#2D6A4F' : '#3D8B6A'}"></div></div>
        <div class="mes-amount">${fmt(m.total)}</div>
        <div class="mes-var" style="color:${varColor}">${i > 0 ? fmtPct(m.var_pct) : '—'}</div>
      </div>`;
  });
  
  let html = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="font-size:14px;font-weight:700;color:var(--text)">Cronograma</div>
        <div style="background:var(--verde-light);color:var(--verde);font-size:11px;font-weight:700;padding:4px 10px;border-radius:10px">Total: ${fmt(total2026)}</div>
      </div>
      ${rowsHtml}
      <div class="flujo-total">
        <div class="flujo-label">💰 Acumulado 2026</div>
        <div class="flujo-amt">${fmt(total2026)}</div>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title" style="margin-bottom:10px">Evolución mensual</div>
      <div style="position:relative;width:100%;height:180px">
        <canvas id="chartMes" role="img" aria-label="Evolución de costos mensuales">Evolución de costos.</canvas>
      </div>
    </div>`;
  
  document.getElementById('meses-content').innerHTML = html;
  
  dibujarChartMes(d);
}

function dibujarChartMes(d) {
  const meses2 = d.ultimos12.filter(m => m.total > 0);
  const el = document.getElementById('chartMes');
  if (!el) return;
  if (charts.mes) charts.mes.destroy();
  charts.mes = new Chart(el, {
    type: 'bar',
    data: {
      labels: meses2.map(m => m.label),
      datasets: [{
        label:'Costo',
        data: meses2.map(m => m.total),

        y: { grid:{color:'#F5F5FA'}, ticks:{callback:v=>fmt(v),font:{size:9}}, min:0 }
      }
    }
  });
}

// ── RENDER PROYECCIÓN ───────────────────────────────────────────────
function renderProyeccion(d) {
  const p = d.proyeccion || { promedio:0, tendencia:0, proximo:0, en3meses:0, en6meses:0 };
  const tendSign = p.tendencia >= 0 ? '+' : '';
  
  let html = `
    <div class="proj-grid">
      <div class="proj-card">
        <div class="proj-label">Tendencia</div>
        <div class="proj-amt" style="color:${p.tendencia >= 0 ? 'var(--verde)' : 'var(--rojo)'}">
          ${tendSign}${fmt(p.tendencia)}<br><span style="font-size:11px">/mes</span>
        </div>
        <div class="proj-sub">Crecimiento mensual</div>
      </div>
      <div class="proj-card">
        <div class="proj-label">Próx. mes <span class="proj-badge">Est.</span></div>
        <div class="proj-amt">${fmt(p.proximo)}</div>
        <div class="proj-sub">Estimado</div>
      </div>
      <div class="proj-card">
        <div class="proj-label">3 meses <span class="proj-badge">Est.</span></div>
        <div class="proj-amt">${fmt(p.en3meses)}</div>
        <div class="proj-sub">Acumulado est.</div>
      </div>
    </div>`;
  
  // Gráfico histórico + proyección
  const reales = d.ultimos12.map(m => m.total > 0 ? m.total : null);
  const lastReal = reales.filter(v => v !== null).pop();
  const labelsProj = [...d.ultimos12.map(m => m.label), 'Jun', 'Jul', 'Ago'];
  const realArr   = [...reales, null, null, null];
  const proyArr   = [...d.ultimos12.map(() => null)];
  proyArr[proyArr.length-1] = lastReal;
  proyArr.push(p.proximo, p.proximo + p.tendencia, p.proximo + p.tendencia * 2);
  
  html += `
    <div class="chart-card">
      <div class="chart-header">
        <div class="chart-title">Histórico + proyección</div>
        <div style="background:var(--morado-light);color:var(--morado);font-size:11px;font-weight:700;padding:4px 10px;border-radius:10px">🔮 Proyectado</div>
      </div>
      <div class="legend-row">
        <div class="leg"><div class="leg-dot" style="background:#2D6A4F"></div>Real</div>
        <div class="leg"><div class="leg-dot" style="background:#7B1FA2"></div>Proyectado</div>
      </div>
      <div style="position:relative;width:100%;height:190px">
        <canvas id="chartProj" role="img" aria-label="Histórico y proyección de costos">Histórico y proyección.</canvas>
      </div>
    </div>
    
    <div class="chart-card">
      <div class="chart-title" style="margin-bottom:10px">Escenarios próximo mes</div>
      <div style="position:relative;width:100%;height:140px">
        <canvas id="chartEsc" role="img" aria-label="Escenarios de costos para el próximo mes">Escenarios de costos.</canvas>
      </div>
    </div>`;
  
  document.getElementById('proy-content').innerHTML = html;
  
  dibujarChartProy(d);
}
